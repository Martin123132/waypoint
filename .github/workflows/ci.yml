name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure test cache paths
        run: echo "WAYPOINT_PLAYWRIGHT_BROWSERS_PATH=$RUNNER_TEMP/waypoint-cache/playwright" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for guided UI tests
        run: npx playwright install --with-deps chromium

      - name: Run verification
        run: npm run verify
